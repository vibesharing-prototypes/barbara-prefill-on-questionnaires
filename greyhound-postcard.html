<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greyhound Postcard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Georgia', serif;
            padding: 20px;
        }

        .postcard {
            width: 600px;
            height: 400px;
            background: #fff;
            border: 2px solid #333;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            display: flex;
            position: relative;
        }

        .postcard::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 8px solid #fff;
            pointer-events: none;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .front-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #87CEEB 0%, #F0E68C 100%);
            padding: 30px;
            border-right: 2px dashed #999;
        }

        .back-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 30px;
            background: #fffef0;
        }

        .greyhound-container {
            width: 100%;
            max-width: 250px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 28px;
            color: #333;
            text-align: center;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 14px;
            color: #555;
            font-style: italic;
            margin-top: 10px;
        }

        .message-area {
            flex: 1;
            border: 1px solid #ddd;
            padding: 15px;
            font-size: 14px;
            color: #333;
            line-height: 1.6;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.5);
        }

        .address-section {
            display: flex;
            gap: 15px;
        }

        .stamp {
            width: 60px;
            height: 80px;
            border: 2px solid #333;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e8e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            text-align: center;
            padding: 5px;
            flex-shrink: 0;
        }

        .address-lines {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .address-line {
            border-bottom: 1px solid #999;
            height: 20px;
        }
    </style>
</head>
<body>
    <div class="postcard">
        <div class="front-side">
            <div class="greyhound-container">
                <svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
                    <!-- Ground -->
                    <ellipse cx="100" cy="130" rx="80" ry="10" fill="#90EE90" opacity="0.4"/>

                    <!-- Greyhound body -->
                    <path d="M 140 80 Q 150 75 155 70 Q 158 65 160 60 L 165 55 L 168 58 L 165 65 Q 162 75 155 82 Q 148 88 140 90 Z" fill="#8B7355"/>

                    <!-- Main body -->
                    <ellipse cx="100" cy="90" rx="45" ry="25" fill="#A0826D"/>

                    <!-- Chest -->
                    <ellipse cx="135" cy="90" rx="25" ry="28" fill="#8B7355"/>

                    <!-- Rear haunch -->
                    <ellipse cx="70" cy="88" rx="20" ry="24" fill="#8B7355"/>

                    <!-- Head -->
                    <ellipse cx="165" cy="58" rx="12" ry="14" fill="#A0826D"/>

                    <!-- Snout -->
                    <ellipse cx="175" cy="58" rx="8" ry="6" fill="#8B7355"/>

                    <!-- Ear -->
                    <path d="M 160 48 Q 158 42 160 38 Q 162 40 162 45 Z" fill="#8B7355"/>

                    <!-- Eye -->
                    <circle cx="168" cy="55" r="2" fill="#333"/>

                    <!-- Nose -->
                    <circle cx="180" cy="57" r="2" fill="#333"/>

                    <!-- Front legs -->
                    <rect x="130" y="110" width="6" height="25" rx="3" fill="#8B7355"/>
                    <rect x="120" y="110" width="6" height="25" rx="3" fill="#8B7355"/>

                    <!-- Back legs -->
                    <rect x="75" y="108" width="6" height="27" rx="3" fill="#8B7355"/>
                    <rect x="65" y="108" width="6" height="27" rx="3" fill="#8B7355"/>

                    <!-- Paws -->
                    <ellipse cx="133" cy="135" rx="4" ry="2" fill="#654321"/>
                    <ellipse cx="123" cy="135" rx="4" ry="2" fill="#654321"/>
                    <ellipse cx="78" cy="135" rx="4" ry="2" fill="#654321"/>
                    <ellipse cx="68" cy="135" rx="4" ry="2" fill="#654321"/>

                    <!-- Tail (curved) -->
                    <path d="M 55 85 Q 40 80 35 70 Q 32 78 38 85 Q 45 90 55 88 Z" fill="#8B7355"/>

                    <!-- Collar -->
                    <ellipse cx="150" cy="70" rx="8" ry="4" fill="#ff6b6b"/>
                    <circle cx="155" cy="70" r="2" fill="#FFD700"/>
                </svg>
            </div>
            <div class="title">GREETINGS</div>
            <div class="subtitle">Swift as the Wind</div>
        </div>

        <div class="back-side">
            <div class="message-area">
                Dear Friend,
                <br><br>
                Sending you warm wishes and the speed of a greyhound!
                <br><br>
                Best regards
            </div>

            <div class="address-section">
                <div class="stamp">
                    <div>POSTAGE<br>STAMP</div>
                </div>
                <div class="address-lines">
                    <div class="address-line"></div>
                    <div class="address-line"></div>
                    <div class="address-line"></div>
                    <div class="address-line"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
